# aragog-exporters — STAGE environment overrides
global:
  namespace: aragog-stage

vault:
  role: "aragog-stage-read"
  secretPath: "org/data/stage/aragog_exporters"

images:
  exporter:
    pullPolicy: Always
  pgWriter:
    pullPolicy: Always
  chWriter:
    pullPolicy: Always

exporterDefaults:
  batchSize: 5000
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 5

observability:
  serviceMonitor:
    enabled: true
  alerting:
    slackChannel: "#parsing-exporters-stage"
