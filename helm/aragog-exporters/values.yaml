  takeaway-bg-delivery:
    type: organization
    queue: "delivery:source_57:items"
    schema: source_57
    sourceName: "TakeawayBg Update"
    batchSize: 5000

  grabfood-delivery:
    type: organization
    queue: "delivery:source_58:items"
    schema: source_58
    sourceName: "Grabfood Update"
    batchSize: 5000

  swiggy-delivery:
    type: organization
    queue: "delivery:source_61:items"
    schema: source_61
    sourceName: "Swiggy"
    batchSize: 5000
    hpa:
      maxReplicas: 30

  # ===== Review Exporters =====

  tripadvisor-reviews:
    type: reviews
    queue: "tripadvisor_reviews:items"
    schema: source_33
    sourceName: "Tripadvisor"
    batchSize: 10000
    dupefilterKey: "tripadvisor:reviews_dupefilter"

  yandex-map-reviews:
    type: reviews
    queue: "yandex_map_reviews:items"
    schema: source_47
    sourceName: "Yandex Maps"
    batchSize: 50000
    dupefilterKey: "yamap:reviews_dupefilter"

  baidu-map-reviews:
    type: reviews
    queue: "baidu_map_reviews:items"
    schema: source_40
    sourceName: "Baidu"
    batchSize: 10000
    dupefilterKey: "baidu:reviews_dupefilter"

  yelp-reviews:
    type: reviews
    queue: "yelp_reviews:items"
    schema: source_39
    sourceName: "Yelp"
    batchSize: 10000
    dupefilterKey: "yelp:reviews_dupefilter"

  yahoo-reviews:
    type: reviews
    queue: "yahoo_map_reviews:items"
