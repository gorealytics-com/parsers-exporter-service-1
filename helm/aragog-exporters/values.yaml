    queue: "opentable_reviews:items"
    schema: source_63
    sourceName: "Opentable"
    batchSize: 100000
    dupefilterKey: "opentable:reviews_dupefilter"

# ---------------------------------------------------------------------------
# DB Writers
# ---------------------------------------------------------------------------
writers:

  pg:
    enabled: true
    replicas: 3
    consumerGroup: "aragog-pg-writers"
    topic: "orgs.validated.v1"
    batchSize: 1000
    flushIntervalMs: 5000
    resources:
      requests:
        cpu: "200m"
        memory: "512Mi"
      limits:
        cpu: "1000m"
        memory: "1Gi"
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 12
      targetCPU: 70
      targetMemory: 80
      scaleDownStabilization: 300

  ch:
    enabled: true
    replicas: 2
    consumerGroup: "aragog-ch-writers"
    topic: "reviews.validated.v1"
    batchSize: 50000
    flushIntervalMs: 10000
    resources:
      requests:
        cpu: "200m"
        memory: "1Gi"
      limits:
        cpu: "1000m"
        memory: "2Gi"
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 12
      targetCPU: 70
      targetMemory: 80
      scaleDownStabilization: 300

# ---------------------------------------------------------------------------
# PgBouncer
# ---------------------------------------------------------------------------
pgbouncer:
  enabled: true
  replicas: 2
  image:
    repository: bitnami/pgbouncer
    tag: "1.22.0"
  poolMode: transaction
  maxClientConn: 200
  defaultPoolSize: 10
  maxDbConnections: 50
  resources:
    requests:
      cpu: "100m"
      memory: "64Mi"
    limits:
      cpu: "500m"
      memory: "128Mi"

# ---------------------------------------------------------------------------
# Observability
# ---------------------------------------------------------------------------
observability:
  serviceMonitor:
    enabled: true
    interval: 30s
    labels:
      release: prometheus
  prometheusRules:
    enabled: true
  grafanaDashboard:
    enabled: true

# ---------------------------------------------------------------------------
# Slack alerting
# ---------------------------------------------------------------------------
slack:
  # Bot token — store in GitHub Actions secrets as SLACK_BOT_TOKEN
  botToken: ""
  channels:
    dev: "#parsing-exporters-dev"
    stage: "#parsing-exporters-stage"
    prod: "#parsing-exporters-prod"
