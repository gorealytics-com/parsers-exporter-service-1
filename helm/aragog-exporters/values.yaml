    schema: source_27
    sourceName: "Ubereats Update"
    batchSize: 5000
    hpa:
      maxReplicas: 30

  ubereats-sitemap-delivery:
    type: organization
    queue: "delivery:source_27:sitemap:items"
    schema: source_27
    sourceName: "Ubereats Sitemap Update"
    batchSize: 5000

  wolt-delivery:
    type: organization
    queue: "delivery:source_28:items"
    schema: source_28
    sourceName: "Wolt Update"
    batchSize: 5000

  bistro-delivery:
    type: organization
    queue: "delivery:source_29:items"
    schema: source_29
    sourceName: "Bistro Update"
