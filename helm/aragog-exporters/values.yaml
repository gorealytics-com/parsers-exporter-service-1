  pyszne-delivery:
    type: organization
    queue: "delivery:source_31:items"
    schema: source_31
    sourceName: "Pyszne Update"
    batchSize: 5000

  tazz-delivery:
    type: organization
    queue: "delivery:source_32:items"
    schema: source_32
    sourceName: "Tazz Update"
    batchSize: 5000

  loko-delivery:
    type: organization
    queue: "delivery:source_36:items"
    schema: source_36
    sourceName: "Loko Update"
    batchSize: 5000

  foodora-delivery:
    type: organization
    queue: "delivery:source_38:items"
    schema: source_38
    sourceName: "Foodora Update"
    batchSize: 5000

  foodora-sitemap-delivery:
    type: organization
    queue: "delivery:source_38:sitemap:items"
    schema: source_38
    sourceName: "Foodora Sitemap Update"
    batchSize: 5000

  misteram-delivery:
    type: organization
    queue: "delivery:source_43:items"
    schema: source_43
    sourceName: "Misteram Update"
    batchSize: 5000

  boltfood-delivery:
    type: organization
    queue: "delivery:source_44:items"
    schema: source_44
    sourceName: "Boltfood Update"
    batchSize: 5000

  jidlopodnos-delivery:
    type: organization
    queue: "delivery:source_45:items"
    schema: source_45
    sourceName: "Jidlopodnos Update"
    batchSize: 5000

  mixfood-delivery:
    type: organization
    queue: "delivery:source_51:items"
    schema: source_51
    sourceName: "Mixfood Update"
    batchSize: 5000

  tomato-delivery:
    type: organization
    queue: "delivery:source_52:items"
    schema: source_52
