  doordash-search:
    type: organization
    queue: "doordash_search:items"
    schema: source_53
    sourceName: "Doordash Update"
    batchSize: 1000

  bond-delivery:
    type: organization
    queue: "delivery:source_23:items"
    schema: source_23
    sourceName: "Bond Update"
    batchSize: 5000

  fooderos-delivery:
    type: organization
    queue: "delivery:source_24:items"
    schema: source_24
    sourceName: "Fooderos Update"
    batchSize: 5000

  foody-delivery:
    type: organization
    queue: "delivery:source_25:items"
    schema: source_25
    sourceName: "Foody Update"
    batchSize: 5000

  ubereats-delivery:
