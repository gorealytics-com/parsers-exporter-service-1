# =============================================================================
# aragog-exporters — Unified Helm Values
# =============================================================================
# This file replaces the old config.yaml.
# All exporter/writer configs are defined here and templated via Helm `range`.
# Secrets come from Vault Agent Injector (annotations on pods).
# =============================================================================

# ---------------------------------------------------------------------------
# Global settings
# ---------------------------------------------------------------------------
nameOverride: ""
fullnameOverride: ""

global:
  namespace: aragog
  imageRegistry: "ghcr.io/gorealytics-com/aragog-exporters"
  imagePullSecrets:
    - name: ghcr-secret

  labels:
    app.kubernetes.io/part-of: aragog
    app.kubernetes.io/managed-by: helm

# ---------------------------------------------------------------------------
# Vault Agent Injector
# ---------------------------------------------------------------------------
vault:
  # Vault UI: https://vault.rea:8200/ui
  address: "https://vault.rea:8200"
  role: "aragog-prod-read"
  secretPath: "org/data/prod/aragog_exporters"

# ---------------------------------------------------------------------------
# Container images
# ---------------------------------------------------------------------------
images:
  exporter:
    repository: ghcr.io/gorealytics-com/aragog-exporters/exporter
    tag: "latest"  # overridden by CI via --set images.exporter.tag=v1.2.3
    pullPolicy: IfNotPresent
  pgWriter:
    repository: ghcr.io/gorealytics-com/aragog-exporters/pg-writer
    tag: "latest"
    pullPolicy: IfNotPresent
  chWriter:
    repository: ghcr.io/gorealytics-com/aragog-exporters/ch-writer
    tag: "latest"
    pullPolicy: IfNotPresent

# ---------------------------------------------------------------------------
# Kafka — connection & topic defaults
# ---------------------------------------------------------------------------
kafka:
  bootstrapServers: "kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
  sasl:
    enabled: false
    mechanism: "SCRAM-SHA-512"
  tls:
    enabled: false

  topics:
    orgsValidated: "orgs.validated.v1"
    reviewsValidated: "reviews.validated.v1"
    orgsDlq: "orgs.dlq.v1"
    reviewsDlq: "reviews.dlq.v1"

  producer:
    acks: "all"
    compressionType: "lz4"
    lingerMs: 50
    batchSize: 65536

# ---------------------------------------------------------------------------
# Redis — connection defaults
# ---------------------------------------------------------------------------
redis:
  defaultUrl: ""  # injected from Vault via env

# ---------------------------------------------------------------------------
# Exporter defaults (applied to all exporters unless overridden)
# ---------------------------------------------------------------------------
exporterDefaults:
  replicas: 1
  resources:
    requests:
      cpu: "100m"
      memory: "256Mi"
    limits:
      cpu: "500m"
      memory: "512Mi"
  checkIntervalSeconds: 30
  batchSize: 10000
  metrics:
    enabled: true
    port: 8080
    path: /metrics
  health:
    port: 8080
    livenessPath: /health
    readinessPath: /ready
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 20
    targetCPU: 70
    targetMemory: 80
    scaleDownStabilization: 300

# ---------------------------------------------------------------------------
# Exporters — one Deployment + ScaledObject per entry
# ---------------------------------------------------------------------------
exporters:

  # ===== Map/Directory Sources — Organization Exporters =====

  bing-map-search:
    type: organization
    queue: "bing_map_search:items"
    schema: source_42
    sourceName: "Bing Org Update"
    batchSize: 10000

  tripadvisor-search:
    type: organization
    queue: "tripadvisor_search:items"
    schema: source_33
    sourceName: "Trip Org Update"
    batchSize: 10000

  yandex-map-orgs-update:
    type: organization
    queue: "yandex_map_orgs_update:items"
    schema: source_49
    sourceName: "Yandex Org Update"
    batchSize: 10000

  baidu-map-search:
    type: organization
    queue: "baidu_map_search:items"
    schema: source_40
    sourceName: "Baidu Org Update"
    batchSize: 10000

  yelp-search:
    type: organization
    queue: "yelp_search:items"
    schema: source_39
    sourceName: "Yelp Org Update"
    batchSize: 10000

  yahoo-map-search:
    type: organization
    queue: "yahoo_map_search:items"
    schema: source_41
    sourceName: "Yahoo Update"
    batchSize: 10000

  opentable-search:
    type: organization
    queue: "opentable_search:items"
    schema: source_63
    sourceName: "Opentable Org Update"
    batchSize: 10000

  # ===== Delivery Sources — Organization Exporters =====

  delivery-com-search:
    type: organization
    queue: "delivery_com_search:items"
    schema: source_54
    sourceName: "DeliveryCom Update"
    batchSize: 500
    resources:
      requests:
        cpu: "100m"
        memory: "128Mi"
