# =============================================================================
# aragog-exporters — DEV environment overrides
# =============================================================================
# ArgoCD: https://argocd.dev.rea/applications
# Grafana: https://grafana.dev.k8s.rea/login
# Vault: https://vault.rea:8200/ui → org/data/dev/aragog_exporters
# =============================================================================

global:
  namespace: aragog-dev

vault:
  role: "aragog-dev-read"
  secretPath: "org/data/dev/aragog_exporters"

images:
  exporter:
    tag: "develop"
    pullPolicy: Always
  pgWriter:
    tag: "develop"
    pullPolicy: Always
  chWriter:
    tag: "develop"
    pullPolicy: Always

# Dev: smaller resources, fewer replicas
exporterDefaults:
  replicas: 1
  batchSize: 1000
  checkIntervalSeconds: 10
  resources:
    requests:
      cpu: "50m"
      memory: "128Mi"
    limits:
      memory: "512Mi"
  hpa:
    enabled: false

writers:
  pg:
    replicas: 1
    resources:
      requests:
        cpu: "100m"
        memory: "256Mi"
      limits:
        memory: "1Gi"
  ch:
    replicas: 1
    batchSize: 10000

observability:
  serviceMonitor:
    enabled: true
    interval: "30s"
  prometheusRule:
    enabled: true
  grafanaDashboard:
    enabled: true
  alerting:
    slackChannel: "#parsing-exporters-dev"

kafka:
  bootstrapServers: "kafka-cluster-kafka-bootstrap.kafka.svc.cluster.local:9092"
