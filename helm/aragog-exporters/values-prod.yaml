# aragog-exporters — PROD environment overrides
global:
  namespace: aragog-prod

vault:
  role: "aragog-prod-read"
  secretPath: "org/data/prod/aragog_exporters"

exporterDefaults:
  batchSize: 10000
  hpa:
    enabled: true
    minReplicas: 1
    maxReplicas: 20
    targetCPU: 70
    targetMemory: 80

writers:
  pg:
    replicas: 2
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 8
  ch:
    replicas: 1
    batchSize: 50000
    hpa:
      enabled: true
      minReplicas: 1
      maxReplicas: 6

observability:
  serviceMonitor:
    enabled: true
  alerting:
    slackChannel: "#parsing-exporters-prod"
