{{/*
=======================================================================
  HPA — Horizontal Pod Autoscaler for Exporters
  Scales based on CPU utilization (built-in K8s, no extra operators).
  Replaces KEDA ScaledObjects.
=======================================================================
*/}}
{{- range $name, $cfg := .Values.exporters }}
{{- $defaults := $.Values.exporterDefaults }}
{{- $hpa := $cfg.hpa | default dict }}
{{- $hpaDefaults := $defaults.hpa }}
{{- if ($hpa.enabled | default $hpaDefaults.enabled) }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hpa-exporter-{{ $name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "helm-charts.exporterLabels" (dict "root" $ "exporterName" $name "exporterType" ($cfg.type | default "organization")) | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: exporter-{{ $name }}
  minReplicas: {{ $hpa.minReplicas | default $hpaDefaults.minReplicas }}
  maxReplicas: {{ $hpa.maxReplicas | default $hpaDefaults.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ $hpa.targetCPU | default $hpaDefaults.targetCPU }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ $hpa.targetMemory | default $hpaDefaults.targetMemory }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: {{ $hpa.scaleDownStabilization | default $hpaDefaults.scaleDownStabilization }}
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
{{- end }}
{{- end }}
