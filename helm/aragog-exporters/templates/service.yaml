{{/*
=======================================================================
  Services — for Prometheus ServiceMonitor pod discovery
=======================================================================
*/}}

{{/* One headless Service per exporter */}}
{{- range $name, $cfg := .Values.exporters }}
{{- $defaults := $.Values.exporterDefaults }}
---
apiVersion: v1
kind: Service
metadata:
  name: exporter-{{ $name }}
  namespace: {{ $.Values.global.namespace }}
  labels:
    {{- include "helm-charts.exporterLabels" (dict "root" $ "exporterName" $name "exporterType" ($cfg.type | default "organization")) | nindent 4 }}
spec:
  clusterIP: None  # headless — ServiceMonitor discovers pods directly
  selector:
    {{- include "helm-charts.exporterSelectorLabels" (dict "root" $ "exporterName" $name) | nindent 4 }}
  ports:
    - name: metrics
      port: {{ $defaults.metrics.port }}
      targetPort: metrics
      protocol: TCP
{{- end }}

{{/* PG Writer Service */}}
{{- if .Values.writers.pg.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "helm-charts.fullname" . }}-pg-writer
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "helm-charts.writerLabels" (dict "root" . "writerName" "pg") | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "helm-charts.writerSelectorLabels" (dict "root" . "writerName" "pg") | nindent 4 }}
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
      protocol: TCP
{{- end }}

{{/* CH Writer Service */}}
{{- if .Values.writers.ch.enabled }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "helm-charts.fullname" . }}-ch-writer
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "helm-charts.writerLabels" (dict "root" . "writerName" "ch") | nindent 4 }}
spec:
  clusterIP: None
  selector:
    {{- include "helm-charts.writerSelectorLabels" (dict "root" . "writerName" "ch") | nindent 4 }}
  ports:
    - name: metrics
      port: 8080
      targetPort: metrics
      protocol: TCP
{{- end }}
