{{/*
=======================================================================
  Alertmanager Configuration — Slack routing per environment
  Bot token: store as K8s Secret or Vault secret
  Example token: faketoken
  
  Channels:
    - #parsing-exporters-dev
    - #parsing-exporters-stage
    - #parsing-exporters-prod
=======================================================================
*/}}
{{- if .Values.observability.prometheusRules.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "helm-charts.fullname" . }}-alertmanager-config
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "helm-charts.labels" . | nindent 4 }}
data:
  alertmanager-config.yaml: |
    route:
      receiver: slack-default
      group_by: ['alertname', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      routes:
        - match:
            namespace: aragog-dev
          receiver: slack-dev
        - match:
            namespace: aragog-stage
          receiver: slack-stage
        - match:
            namespace: aragog-prod
          receiver: slack-prod
          continue: true

    receivers:
      - name: slack-default
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/slack-webhook
            channel: '{{ .Values.slack.channels.prod | default "#parsing-exporters-prod" }}'
            send_resolved: true
            title: '{{ "{{ .Status | toUpper }}" }} | {{ "{{ .CommonLabels.alertname }}" }}'
            text: >-
              *Namespace:* {{ "{{ .CommonLabels.namespace }}" }}
              *Pod:* {{ "{{ .CommonLabels.pod }}" }}
              *Description:* {{ "{{ .CommonAnnotations.description }}" }}

      - name: slack-dev
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/slack-webhook
            channel: '{{ .Values.slack.channels.dev | default "#parsing-exporters-dev" }}'
            send_resolved: true
            title: '{{ "{{ .Status | toUpper }}" }} | {{ "{{ .CommonLabels.alertname }}" }}'
            text: >-
              *Namespace:* {{ "{{ .CommonLabels.namespace }}" }}
              *Pod:* {{ "{{ .CommonLabels.pod }}" }}
              *Description:* {{ "{{ .CommonAnnotations.description }}" }}
              <@U07ABC123> <@U07DEF456>

      - name: slack-stage
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/slack-webhook
            channel: '{{ .Values.slack.channels.stage | default "#parsing-exporters-stage" }}'
            send_resolved: true
            title: '{{ "{{ .Status | toUpper }}" }} | {{ "{{ .CommonLabels.alertname }}" }}'
            text: >-
              *Namespace:* {{ "{{ .CommonLabels.namespace }}" }}
              *Pod:* {{ "{{ .CommonLabels.pod }}" }}
              *Description:* {{ "{{ .CommonAnnotations.description }}" }}
              <@U07ABC123> <@U07DEF456>

      - name: slack-prod
        slack_configs:
          - api_url_file: /etc/alertmanager/secrets/slack-webhook
            channel: '{{ .Values.slack.channels.prod | default "#parsing-exporters-prod" }}'
            send_resolved: true
            title: '{{ "{{ .Status | toUpper }}" }} | {{ "{{ .CommonLabels.alertname }}" }}'
            text: >-
              *Namespace:* {{ "{{ .CommonLabels.namespace }}" }}
              *Pod:* {{ "{{ .CommonLabels.pod }}" }}
              *Description:* {{ "{{ .CommonAnnotations.description }}" }}
              <@U07ABC123> <@U07DEF456>
{{- end }}
