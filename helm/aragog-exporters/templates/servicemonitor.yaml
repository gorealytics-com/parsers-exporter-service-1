{{/*
=======================================================================
  Prometheus ServiceMonitors
  ServiceMonitor MUST be enabled — requirement from monitoring task.
=======================================================================
*/}}
{{- if .Values.observability.serviceMonitor.enabled }}

{{/* ServiceMonitor for all exporters */}}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "helm-charts.fullname" . }}-exporters
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "helm-charts.labels" . | nindent 4 }}
    aragog.io/component: exporter
    {{- with .Values.observability.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      aragog.io/component: exporter
      app.kubernetes.io/instance: {{ .Release.Name }}
  namespaceSelector:
    matchNames:
      - {{ .Values.global.namespace }}
  endpoints:
    - port: metrics
      interval: {{ .Values.observability.serviceMonitor.interval }}
      path: {{ .Values.exporterDefaults.metrics.path }}

{{/* ServiceMonitor for writers */}}
---
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "helm-charts.fullname" . }}-writers
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "helm-charts.labels" . | nindent 4 }}
    aragog.io/component: writer
    {{- with .Values.observability.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      aragog.io/component: writer
      app.kubernetes.io/instance: {{ .Release.Name }}
  namespaceSelector:
    matchNames:
      - {{ .Values.global.namespace }}
  endpoints:
    - port: metrics
      interval: {{ .Values.observability.serviceMonitor.interval }}
      path: /metrics

{{- end }}
