{{/*
=======================================================================
  DB Writer Deployments — pg-writer and ch-writer
  Vault Agent Injector provides secrets via /vault/secrets/env
=======================================================================
*/}}

{{/* --- PostgreSQL Writer --- */}}
{{- if .Values.writers.pg.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "helm-charts.fullname" . }}-pg-writer
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "helm-charts.writerLabels" (dict "root" . "writerName" "pg") | nindent 4 }}
spec:
  replicas: {{ .Values.writers.pg.replicas }}
  selector:
    matchLabels:
      {{- include "helm-charts.writerSelectorLabels" (dict "root" . "writerName" "pg") | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "helm-charts.writerSelectorLabels" (dict "root" . "writerName" "pg") | nindent 8 }}
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8080"
        prometheus.io/path: "/metrics"
        # --- Vault Agent Injector ---
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: {{ .Values.vault.role | quote }}
        vault.hashicorp.com/agent-inject-secret-env: {{ .Values.vault.secretPath | quote }}
        vault.hashicorp.com/tls-skip-verify: "true"
        vault.hashicorp.com/agent-inject-template-env: |
          {{`{{- with secret `}}{{ .Values.vault.secretPath | quote }}{{` -}}`}}
          {{`{{ range $k, $v := .Data.data }}`}}
          export {{`{{ $k }}`}}="{{`{{ $v }}`}}"
          {{`{{ end }}`}}
          {{`{{- end }}`}}
    spec:
      terminationGracePeriodSeconds: 60
      serviceAccountName: {{ include "helm-charts.fullname" . }}-sa
      {{- with .Values.global.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      containers:
        - name: pg-writer
          image: "{{ .Values.images.pgWriter.repository }}:{{ .Values.images.pgWriter.tag }}"
          imagePullPolicy: {{ .Values.images.pgWriter.pullPolicy }}
          command: ["/bin/bash"]
          args: ["-c", "source /vault/secrets/env && exec python -m service.main"]
          ports:
            - name: metrics
              containerPort: 8080
              protocol: TCP
          env:
            - name: WRITER_TYPE
              value: "postgresql"
            - name: KAFKA_BOOTSTRAP_SERVERS
              value: {{ .Values.kafka.bootstrapServers | quote }}
            - name: KAFKA_TOPIC
              value: {{ .Values.kafka.topics.orgsValidated | quote }}
            - name: KAFKA_CONSUMER_GROUP
              value: {{ .Values.writers.pg.consumerGroup | quote }}
            - name: BATCH_SIZE
              value: {{ .Values.writers.pg.batchSize | quote }}
            - name: FLUSH_INTERVAL_MS
              value: {{ .Values.writers.pg.flushIntervalMs | quote }}
          resources:
            {{- toYaml .Values.writers.pg.resources | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /health
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /ready
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
{{- end }}

