{{/*
=======================================================================
  PgBouncer — Transaction-mode connection pooler for PostgreSQL
  Vault Agent Injector provides backend PG credentials
=======================================================================
*/}}
{{- if .Values.pgbouncer.enabled }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "helm-charts.fullname" . }}-pgbouncer
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "helm-charts.labels" . | nindent 4 }}
    aragog.io/component: pgbouncer
spec:
  replicas: {{ .Values.pgbouncer.replicas }}
  selector:
    matchLabels:
      {{- include "helm-charts.selectorLabels" . | nindent 6 }}
      aragog.io/component: pgbouncer
  template:
    metadata:
      labels:
        {{- include "helm-charts.selectorLabels" . | nindent 8 }}
        aragog.io/component: pgbouncer
      annotations:
        vault.hashicorp.com/agent-inject: "true"
        vault.hashicorp.com/role: {{ .Values.vault.role | quote }}
        vault.hashicorp.com/agent-inject-secret-env: {{ .Values.vault.secretPath | quote }}
        vault.hashicorp.com/tls-skip-verify: "true"
        vault.hashicorp.com/agent-inject-template-env: |
          {{`{{- with secret `}}{{ .Values.vault.secretPath | quote }}{{` -}}`}}
          {{`{{ range $k, $v := .Data.data }}`}}
          export {{`{{ $k }}`}}="{{`{{ $v }}`}}"
          {{`{{ end }}`}}
          {{`{{- end }}`}}
    spec:
      containers:
        - name: pgbouncer
          image: "{{ .Values.pgbouncer.image.repository }}:{{ .Values.pgbouncer.image.tag }}"
          command: ["/bin/bash"]
          args: ["-c", "source /vault/secrets/env && exec pgbouncer /etc/pgbouncer/pgbouncer.ini"]
          ports:
            - name: pgbouncer
              containerPort: 6432
              protocol: TCP
          env:
            - name: PGBOUNCER_POOL_MODE
              value: {{ .Values.pgbouncer.poolMode | quote }}
            - name: PGBOUNCER_MAX_CLIENT_CONN
              value: {{ .Values.pgbouncer.maxClientConn | quote }}
            - name: PGBOUNCER_DEFAULT_POOL_SIZE
              value: {{ .Values.pgbouncer.defaultPoolSize | quote }}
            - name: PGBOUNCER_MAX_DB_CONNECTIONS
              value: {{ .Values.pgbouncer.maxDbConnections | quote }}
          resources:
            {{- toYaml .Values.pgbouncer.resources | nindent 12 }}
          livenessProbe:
            tcpSocket:
              port: 6432
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 6432
            initialDelaySeconds: 3
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "helm-charts.fullname" . }}-pgbouncer
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "helm-charts.labels" . | nindent 4 }}
    aragog.io/component: pgbouncer
spec:
  type: ClusterIP
  selector:
    {{- include "helm-charts.selectorLabels" . | nindent 4 }}
    aragog.io/component: pgbouncer
  ports:
    - name: pgbouncer
      port: 5432       # writers connect to this (standard PG port)
      targetPort: 6432  # PgBouncer listens here
      protocol: TCP
{{- end }}
