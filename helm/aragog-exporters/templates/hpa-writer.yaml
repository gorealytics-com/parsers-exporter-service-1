{{/*
=======================================================================
  HPA — Horizontal Pod Autoscaler for Writers
  Scales based on CPU utilization (built-in K8s, no extra operators).
  Replaces KEDA ScaledObjects.
=======================================================================
*/}}

{{/* --- PG Writer HPA --- */}}
{{- if and .Values.writers.pg.enabled .Values.writers.pg.hpa.enabled }}
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: hpa-writer-pg
  namespace: {{ .Values.global.namespace }}
  labels:
    {{- include "helm-charts.writerLabels" (dict "root" . "writerName" "pg") | nindent 4 }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: {{ include "helm-charts.fullname" . }}-pg-writer
  minReplicas: {{ .Values.writers.pg.hpa.minReplicas }}
  maxReplicas: {{ .Values.writers.pg.hpa.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.writers.pg.hpa.targetCPU }}
    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: {{ .Values.writers.pg.hpa.targetMemory }}
  behavior:
    scaleDown:
      stabilizationWindowSeconds: {{ .Values.writers.pg.hpa.scaleDownStabilization | default 300 }}
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60
    scaleUp:
      stabilizationWindowSeconds: 30
      policies:
        - type: Percent
          value: 100
          periodSeconds: 30
{{- end }}

