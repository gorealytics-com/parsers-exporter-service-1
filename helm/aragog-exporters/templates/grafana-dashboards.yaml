{{/*
=======================================================================
  Grafana Dashboard ConfigMaps
  Provisioned via Grafana sidecar (grafana_dashboard: "1" label)
=======================================================================
*/}}
{{- if .Values.observability.grafanaDashboard.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "helm-charts.fullname" . }}-dashboards
  namespace: {{ .Values.global.namespace }}
  labels:
    grafana_dashboard: "1"
    {{- include "helm-charts.labels" . | nindent 4 }}
data:
  exporter-overview.json: |-
    {{ .Files.Get "dashboards/exporter-overview.json" | nindent 4 }}
  writer-overview.json: |-
    {{ .Files.Get "dashboards/writer-overview.json" | nindent 4 }}
  infrastructure.json: |-
    {{ .Files.Get "dashboards/infrastructure.json" | nindent 4 }}
{{- end }}
