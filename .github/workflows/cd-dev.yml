name: Deploy to Dev

on:
  push:
    branches: [develop]

concurrency:
  group: dev-deploy
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  HELM_REPO: gorealytics-com/helm-charts-parsers
  CHART_PATH: aragog-exporters/Chart.yaml
  CHART_VALUES: aragog-exporters/values-dev.yaml

jobs:
  ci:
    uses: ./.github/workflows/ci-tests.yml

  docker-build:
    needs: ci
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: map-exporter
            dockerfile: docker/Dockerfile.exporter
            build_arg: SERVICE_NAME=org-exporter
          - service: delivery-exporter
            dockerfile: docker/Dockerfile.exporter
            build_arg: SERVICE_NAME=delivery-exporter
          - service: sitemap-exporter
            dockerfile: docker/Dockerfile.exporter
            build_arg: SERVICE_NAME=sitemap-exporter
          - service: review-exporter
            dockerfile: docker/Dockerfile.exporter
            build_arg: SERVICE_NAME=review-exporter
          - service: pg-writer
            dockerfile: docker/Dockerfile.writer
            build_arg: SERVICE_NAME=pg-writer
          - service: ch-writer
            dockerfile: docker/Dockerfile.writer
            build_arg: SERVICE_NAME=ch-writer
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build_arg }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:dev-${{ github.sha }}

  # Bump image tag in helm-charts-parsers → ArgoCD auto-syncs
  bump-chart:
    needs: docker-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout helm-charts-parsers
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HELM_REPO }}
          token: ${{ secrets.HELM_REPO_PAT }}
          path: helm-repo

      - name: Update dev image tags
        run: |
          cd helm-repo
          TAG="dev-${{ github.sha }}"

          # Update appVersion in Chart.yaml (dev uses commit SHA)
          sed -i "s/^appVersion:.*/appVersion: \"${TAG}\"/" ${{ env.CHART_PATH }}

          echo "Updated Chart.yaml:"
          grep appVersion ${{ env.CHART_PATH }}

      - name: Commit and push
        run: |
          cd helm-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --cached --quiet || git commit -m "chore(aragog-dev): update to dev-${{ github.sha }}"
          git push

  notify:
    runs-on: ubuntu-latest
    needs: [docker-build, bump-chart]
    if: always()
    steps:
      - name: Notify Slack
        uses: slackapi/slack-github-action@v1.25.0
        with:
          channel-id: '#parsing-exporters-dev'
          slack-message: |
            *Dev Deploy*: ${{ needs.docker-build.result }}
            Chart bump: ${{ needs.bump-chart.result }}
            Commit: `${{ github.sha }}`
            By: ${{ github.actor }}
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
