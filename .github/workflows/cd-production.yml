name: Production Release

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: production-deploy
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository }}
  HELM_REPO: gorealytics-com/helm-charts-parsers
  CHART_PATH: aragog-exporters/Chart.yaml

jobs:
  # ── 1. Lint + Test ──────────────────────────────────────────────
  ci-gate:
    uses: ./.github/workflows/ci-tests.yml

  # ── 2. Semantic Release (tag = version) ─────────────────────────
  release:
    needs: ci-gate
    runs-on: ubuntu-latest
    outputs:
      new_version: ${{ steps.semantic.outputs.new_release_version }}
      released: ${{ steps.semantic.outputs.new_release_published }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install semantic-release plugins
        run: |
          npm install -g semantic-release \
            @semantic-release/exec \
            @semantic-release/git

      - name: Semantic Release
        id: semantic
        uses: cycjimmy/semantic-release-action@v4
        with:
          extra_plugins: |
            @semantic-release/exec
            @semantic-release/git
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 3. Docker Build (6 images, tag = semver) ────────────────────
  docker-build:
    needs: release
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - service: map-exporter
            dockerfile: docker/Dockerfile.exporter
            build_arg: SERVICE_NAME=org-exporter
          - service: delivery-exporter
            dockerfile: docker/Dockerfile.exporter
            build_arg: SERVICE_NAME=delivery-exporter
          - service: sitemap-exporter
            dockerfile: docker/Dockerfile.exporter
            build_arg: SERVICE_NAME=sitemap-exporter
          - service: review-exporter
            dockerfile: docker/Dockerfile.exporter
            build_arg: SERVICE_NAME=review-exporter
          - service: pg-writer
            dockerfile: docker/Dockerfile.writer
            build_arg: SERVICE_NAME=pg-writer
          - service: ch-writer
            dockerfile: docker/Dockerfile.writer
            build_arg: SERVICE_NAME=ch-writer
    steps:
      - uses: actions/checkout@v4

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v5
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          build-args: ${{ matrix.build_arg }}
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:v${{ needs.release.outputs.new_version }}
            ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}/${{ matrix.service }}:latest

  # ── 4. Bump Chart version in helm-charts-parsers repo ───────────
  bump-chart:
    needs: [release, docker-build]
    if: needs.release.outputs.released == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout helm-charts-parsers
        uses: actions/checkout@v4
        with:
          repository: ${{ env.HELM_REPO }}
          token: ${{ secrets.HELM_REPO_PAT }}
          path: helm-repo

      - name: Bump Chart.yaml version and appVersion
        run: |
          cd helm-repo
          VERSION="${{ needs.release.outputs.new_version }}"
          echo "Bumping chart to v${VERSION}"

          # Update appVersion (Docker image tag)
          sed -i "s/^appVersion:.*/appVersion: \"v${VERSION}\"/" ${{ env.CHART_PATH }}

          # Update chart version (same as app version for simplicity)
          sed -i "s/^version:.*/version: ${VERSION}/" ${{ env.CHART_PATH }}

          echo "Updated Chart.yaml:"
          cat ${{ env.CHART_PATH }}

      - name: Commit and push to helm-charts-parsers
        run: |
          cd helm-repo
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ${{ env.CHART_PATH }}
          git commit -m "chore(aragog): bump to v${{ needs.release.outputs.new_version }}"
          git push

  # ── 5. Notify Slack ─────────────────────────────────────────────
  notify:
    runs-on: ubuntu-latest
    needs: [release, docker-build, bump-chart]
    if: always()
    steps:
      - name: Notify Slack
        if: needs.release.outputs.released == 'true'
        uses: slackapi/slack-github-action@v1.25.0
        with:
          channel-id: '#parsing-exporters-prod'
          slack-message: |
            *Production Release* :rocket:
            Version: `v${{ needs.release.outputs.new_version }}`
            Docker: `${{ needs.docker-build.result }}`
            Chart bump: `${{ needs.bump-chart.result }}`
            Commit: `${{ github.sha }}`
            By: ${{ github.actor }}
            ArgoCD: https://argocd.prod.rea/applications
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
