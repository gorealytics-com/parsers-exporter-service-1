# =============================================================================
# Local Development Environment
# =============================================================================
# Provides all infrastructure for local testing of the EDA pipeline:
#   Redis → Exporter → Kafka → Writer → PostgreSQL/ClickHouse
#
# Usage:
#   docker compose -f docker-compose.dev.yml up -d
#   docker compose -f docker-compose.dev.yml logs -f
#   docker compose -f docker-compose.dev.yml down -v   # full reset
#
# Ports (offset to avoid conflicts with production):
#   Redis:      16379
#   PostgreSQL: 15432
#   PgBouncer:  16432
#   ClickHouse: 18123
#   Kafka:      19092
#   Kafka UI:   18080
# =============================================================================

name: aragog-dev

services:

  # --- Redis (input queues) ---
  redis:
    image: redis:7-alpine
    container_name: dev-redis
    command: >
      redis-server
      --appendonly no
      --save ""
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
    ports:
      - "127.0.0.1:16379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - dev

  # --- PostgreSQL ---
  postgres:
    image: postgres:16-alpine
    container_name: dev-postgres
    environment:
      POSTGRES_USER: dev_user
      POSTGRES_PASSWORD: dev_pass
      POSTGRES_DB: aragog_dev
    ports:
      - "127.0.0.1:15432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
      - ./init-scripts/postgres:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U dev_user -d aragog_dev"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev

  # --- PgBouncer (connection pooler) ---
  pgbouncer:
    image: bitnami/pgbouncer:1.22.0
    container_name: dev-pgbouncer
    environment:
      POSTGRESQL_HOST: postgres
      POSTGRESQL_PORT: "5432"
      POSTGRESQL_USERNAME: dev_user
      POSTGRESQL_PASSWORD: dev_pass
      POSTGRESQL_DATABASE: aragog_dev
      PGBOUNCER_POOL_MODE: transaction
      PGBOUNCER_MAX_CLIENT_CONN: "100"
      PGBOUNCER_DEFAULT_POOL_SIZE: "10"
      PGBOUNCER_MAX_DB_CONNECTIONS: "20"
    ports:
      - "127.0.0.1:16432:6432"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - dev

  # --- ClickHouse ---
  clickhouse:
    image: clickhouse/clickhouse-server:24.8
    container_name: dev-clickhouse
    ports:
      - "127.0.0.1:18123:8123"
      - "127.0.0.1:19000:9000"
    volumes:
      - ch_data:/var/lib/clickhouse
      - ./init-scripts/clickhouse:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "localhost:8123/ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dev

  # --- Kafka (single-node for dev) ---
  kafka:
    image: bitnami/kafka:3.7
    container_name: dev-kafka
    environment:
      # KRaft mode (no ZooKeeper)
      KAFKA_CFG_NODE_ID: "0"
      KAFKA_CFG_PROCESS_ROLES: controller,broker
      KAFKA_CFG_CONTROLLER_QUORUM_VOTERS: 0@kafka:9093
      KAFKA_CFG_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CFG_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093,EXTERNAL://:19092
      KAFKA_CFG_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092,EXTERNAL://localhost:19092
      KAFKA_CFG_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_CFG_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CFG_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_CFG_NUM_PARTITIONS: "12"
      KAFKA_CFG_DEFAULT_REPLICATION_FACTOR: "1"
      KAFKA_CFG_LOG_RETENTION_HOURS: "168"  # 7 days
    ports:
      - "127.0.0.1:19092:19092"
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics.sh --bootstrap-server localhost:9092 --list"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 30s
    networks:
      - dev

  # --- Kafka topic init (one-shot) ---
  kafka-init:
    image: bitnami/kafka:3.7
    container_name: dev-kafka-init
    depends_on:
      kafka:
        condition: service_healthy
    entrypoint: ["/bin/bash", "-c"]
    command:
      - |
        echo "Creating Kafka topics..."
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic orgs.validated.v1 --partitions 12 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic reviews.validated.v1 --partitions 12 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic orgs.dlq.v1 --partitions 3 --replication-factor 1
        kafka-topics.sh --bootstrap-server kafka:9092 --create --if-not-exists \
          --topic reviews.dlq.v1 --partitions 3 --replication-factor 1
        echo "Topics created:"
        kafka-topics.sh --bootstrap-server kafka:9092 --list
    networks:
      - dev

  # --- Kafka UI (optional, for debugging) ---
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: dev-kafka-ui
    ports:
      - "127.0.0.1:18080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:9092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - dev

  # --- Data Seeder (one-shot, pushes test data to Redis) ---
  data-seeder:
    build:
      context: .
      dockerfile: docker/Dockerfile.seeder
    container_name: dev-seeder
    environment:
      REDIS_URL: redis://redis:6379/0
      SEED_BATCH_SIZE: "15"
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - dev

volumes:
  pg_data:
  ch_data:

networks:
  dev:
    driver: bridge
